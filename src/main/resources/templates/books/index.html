<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link th:rel="stylesheet"
	th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" />

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<title>INDEX</title>
</head>
<body>
	<h1>Tabella dei libri</h1>


	<table id="table-1">
		<thead>
			<tr>
				<th>ISBN</th>
				<th>TITOLO</th>
				<th>AUTORE</th>
				<th></th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="libro : ${list}">
				<td th:text="${libro.isbn}">1</td>
				<td th:text="${libro.title}">1</td>
				<td th:text="${libro.author}"></td>

				<td><a class="btn btn-primary" target="_blank"
					th:href="@{|/books/show/${libro.id}|}"> <i class="bi bi-book"></i>
					</a>
				</td>
			</tr>
		</tbody>
	</table>
	<div th:if="${list.isEmpty()}">
		<span> La ricerca non ha prodotto risultati </span>
	</div>
	<script th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
