<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>

<!-- Required meta tags -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap CSS -->
<link th:rel="stylesheet"
	th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}" />

<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

<title>INDEX</title>
</head>
<body>

	<div class="container">
		<div class="text-center">
			<h1>Lista delle categorie</h1>
		</div>
		
		<form id="form-categorie" th:action="@{/categories/create}"
				th:object="${categoria}" method="post">
			<div class="input-group mb-3">
				<input type="text" th:field="*{category}" id="category" 
						class="form-control" th:errorClass="is-invalid">
				
				
				<div th:if="${#fields.hasAnyErrors()}" class="invalid-feedback">
					<ul>
						<li th:each="err : ${#fields.allErrors()}" th:text="${err}">
							 Errore 
						</li>
					</ul>
				</div>
				<button class="btn btn-primary" type="submit"> Aggiungi categoria</button>
			</div>
		</form>
		
		<div th:unless="${listaCategorie.isEmpty()}">
			<ul>
				<li th:each="categoria: ${listaCategorie}">
					<p th:text="${categoria.category}" ></p>
				</li>
			</ul>
		</div>
		<div th:if="${listaCategorie.isEmpty()}">
			<p> Non ci sono ancora categorie. </p>
		</div>
	</div>

		<script
			th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}">
		</script>
</body>
</html>
